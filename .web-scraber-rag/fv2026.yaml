sites:
  - name: "Alternativet"
    website: "https://www.alternativet.dk"
    depth: 3
    ignore_urls:
      - "*/personer/sekretariat**"
      - "*/personer/folketing/*"
      - "*/personer/byraad**"
      - "*/personer/ordfoerer**"
      - "*/personer/hovedbestyrelse**"
      - "*/personer/politisk-forum**"
      - "*/kalender*"
      - "https://dialog.alternativet.dk**"
      - "https://alleos.alternativet.dk**"
      - "http://**"
      - "*/persondata**"
      - "*/lokalafdelinger**"
      - "*/info/*"
      - "*/presse**"
      - "*/bidrag**"
      - "*/blivmedlem**"
      - "*/vedtaegter**"
      - "*/skoleelever**"
    domains:
      - "alternativet.dk"
    pdf_patterns:
      - "manifest"
      - "program"
      - "*.pdf"
    description: "The Alternative – An idealistic political party"

  - name: "Enhedslisten"
    website: "https://www.enhedslisten.dk"
    depth: 3
    ignore_urls:
      - "**.webp"
      - "**.jpg"
      - "https://shop.enhedslisten.dk**"
      - "https://mit.enhedslisten.dk**"
      - "https://vores.enhedslisten.dk**"
      - "https://elevernes.enhedslisten.dk**"
      - "*/kontakt/*"
      - "*/stoet/*"
      - "*/byraad/*"
      - "*/regionsraad/*"
      - "*/english/*"
      - "*/cookie**"
      - "http://**"
    domains:
      - "enhedslisten.dk"
    pdf_patterns:
      - "*.pdf"
    description: "The Unity List – A Danish left-wing political alliance"

  - name: "Frie Grønne"
    website: "https://friegronne.dk"
    depth: 3
    ignore_urls:
      - "**.pdf"
      - "**donation**"
      - "*/nyheder**"
      - "**2024**"
      - "**2025**"
      - "*/kontakt**"
      - "**vaelgererklaering**"
      - "*/bliv-**"
      - "*page_id**"
      - "*/kommunalvalgskandidater**"

    domains:
      - "friegronne.dk"
    pdf_patterns:
      - "*.pdf"
    description: "Free Greens – The Liberal Green Party"

