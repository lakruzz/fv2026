# Global crawling settings
crawl_settings:
  max_depth: 2
  timeout_seconds: 30
  respect_robots_txt: true
  rate_limit_delay_seconds: 1
  user_agent: "web-scraper-rag/0.1.0 (+https://github.com/example/web-scraper-rag)"

# Output settings
output:
  markdown_extension: ".md"
  pdf_extension: ".pdf"
  merged_pdf_suffix: "_documents"
